<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kitili Personal Bot</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="login-view" class="screen hidden">
      <form id="login-form" class="card login-card">
        <h1>Kitili Personal Bot</h1>
        <p class="muted">Sign in to run Daily Wrap-Up.</p>
        <label>
          Username
          <input id="username" name="username" autocomplete="username" required />
        </label>
        <label>
          Password
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </label>
        <button type="submit">Log in</button>
        <p id="login-error" class="error" role="alert"></p>
      </form>
    </div>

    <div id="bot-view" class="screen hidden">
      <header class="top">
        <div>
          <h1>Daily Wrap-Up Bot</h1>
          <p class="muted">Paste today's notes, click Run, get Done / Doing / Next.</p>
        </div>
        <button id="logout-btn" type="button" class="ghost">Log out</button>
      </header>

      <main class="card bot-card">
        <label>
          Your notes / input
          <textarea
            id="input"
            rows="10"
            placeholder="## Done&#10;- Finished Module 6 proof&#10;&#10;## Doing&#10;- Deploy personal bot&#10;&#10;## Next&#10;- Submit LMS form"
          ></textarea>
        </label>
        <div class="row">
          <button id="run-btn" type="button">Run</button>
          <span id="status" class="muted"></span>
        </div>
        <label>
          Bot output
          <pre id="output" class="output" aria-live="polite">Waiting for input…</pre>
        </label>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
